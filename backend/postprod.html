<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brandion — Post-Prodüksiyon Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a; color: #f0f0f0; min-height: 100vh;
    }
    header {
      padding: 20px 40px; border-bottom: 1px solid #1f1f1f;
      display: flex; align-items: center; gap: 12px;
    }
    .logo { font-size: 20px; font-weight: 700; }
    .logo span { color: #7c6af5; }
    .badge { background: #1a1a2e; color: #7c6af5; font-size: 11px;
             padding: 3px 10px; border-radius: 20px; border: 1px solid #3a3060; }

    .layout { display: grid; grid-template-columns: 340px 1fr; min-height: calc(100vh - 61px); }

    /* ── SOL PANEL ── */
    .sidebar {
      border-right: 1px solid #1a1a1a; padding: 24px 20px;
      background: #0d0d0d; overflow-y: auto;
    }
    .sidebar h2 { font-size: 13px; color: #666; text-transform: uppercase;
                  letter-spacing: 0.8px; margin-bottom: 12px; }
    .project-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .project-item {
      background: #111; border: 1px solid #222; border-radius: 10px;
      padding: 12px 14px; cursor: pointer; transition: border-color 0.2s;
    }
    .project-item:hover, .project-item.active { border-color: #7c6af5; }
    .project-item .ptitle { font-size: 14px; font-weight: 600; }
    .project-item .pmeta { font-size: 12px; color: #666; margin-top: 3px; }

    .new-project-form { background: #111; border: 1px solid #222; border-radius: 10px; padding: 16px; }
    .new-project-form h3 { font-size: 13px; color: #888; margin-bottom: 12px; }

    /* ── SAĞ PANEL ── */
    .main { padding: 32px 40px; overflow-y: auto; }
    .main h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .main .sub { color: #666; font-size: 14px; margin-bottom: 28px; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 60vh; color: #444; text-align: center;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    /* SLOT TABLE */
    .slot-section { margin-bottom: 24px; }
    .slot-section h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #ccc; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 12px; color: #555; text-transform: uppercase;
         letter-spacing: 0.6px; padding: 8px 12px; border-bottom: 1px solid #1a1a1a; }
    td { padding: 12px 12px; border-bottom: 1px solid #111; font-size: 13px; }
    td .ts { font-family: monospace; color: #7c6af5; font-size: 13px; }
    td .url-cell { color: #888; max-width: 280px; overflow: hidden;
                   text-overflow: ellipsis; white-space: nowrap; }
    td .code { background: #1a1a2e; color: #7c6af5; font-family: monospace;
               font-size: 12px; padding: 2px 8px; border-radius: 6px; }
    .del-btn { background: none; border: none; color: #444; cursor: pointer;
               font-size: 16px; padding: 4px 8px; }
    .del-btn:hover { color: #f44; }

    /* ADD SLOT FORM */
    .add-slot-card {
      background: #111; border: 1px solid #222; border-radius: 14px;
      padding: 24px; margin-bottom: 24px;
    }
    .add-slot-card h2 { font-size: 15px; font-weight: 600; margin-bottom: 18px; color: #ccc; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 12px; color: #666; }
    input[type="text"], input[type="url"] {
      background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 8px;
      padding: 10px 12px; color: #f0f0f0; font-size: 13px; outline: none;
      transition: border-color 0.2s; font-family: monospace;
    }
    input:focus { border-color: #7c6af5; }
    input::placeholder { color: #444; font-family: inherit; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #7c6af5; color: #fff; border: none; border-radius: 8px;
      padding: 11px 22px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-outline {
      background: transparent; border: 1px solid #7c6af5; color: #7c6af5;
    }
    .btn-outline:hover { background: #7c6af530; }
    .btn-sm { padding: 8px 16px; font-size: 13px; }

    .action-bar {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .action-bar .project-info { flex: 1; }
    .action-bar .project-info h1 { font-size: 20px; }

    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1a3a1a; border: 1px solid #2a5a2a; border-radius: 10px;
      padding: 12px 20px; color: #4caf50; font-size: 14px;
      display: none; z-index: 100;
    }
    .toast.err { background: #3a1a1a; border-color: #5a2a2a; color: #f44336; }
    .hint { font-size: 12px; color: #555; margin-top: 6px; font-style: italic; }
  </style>
</head>
<body>

<header>
  <div class="logo">Brand<span>ion</span></div>
  <div class="badge">POST-PROD STUDIO</div>
</header>

<div class="layout">
  <!-- SOL: Proje listesi -->
  <aside class="sidebar">
    <h2>Projeler</h2>
    <div class="project-list" id="projectList"></div>

    <div class="new-project-form">
      <h3>+ Yeni Proje</h3>
      <div class="form-group" style="margin-bottom:10px;">
        <label>Proje Adı</label>
        <input type="text" id="newTitle" placeholder="Örn: Atiye S02E04" />
      </div>
      <div class="form-group" style="margin-bottom:12px;">
        <label>Müşteri / Marka</label>
        <input type="text" id="newClient" placeholder="Örn: Vakko" />
      </div>
      <button class="btn btn-sm" onclick="createProject()">Oluştur</button>
    </div>
  </aside>

  <!-- SAĞ: Seçili proje -->
  <main class="main" id="mainPanel">
    <div class="empty-state">
      <div class="icon">🎬</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:6px;">Proje seçin</div>
      <div style="font-size:13px;color:#555;">Sol panelden bir proje seçin veya yeni oluşturun.</div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
let currentProjectId = null;

async function api(method, path, body) {
  const opts = { method };
  if (body instanceof FormData) {
    opts.body = body;
  } else if (body) {
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({ detail: r.statusText }));
    throw new Error(err.detail || r.statusText);
  }
  return r.json();
}

function toast(msg, err = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err ? ' err' : '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

async function loadProjects() {
  const projects = await api('GET', '/api/projects');
  const list = document.getElementById('projectList');
  list.innerHTML = '';
  projects.forEach(p => {
    const el = document.createElement('div');
    el.className = 'project-item' + (p.id === currentProjectId ? ' active' : '');
    el.innerHTML = `
      <div class="ptitle">${p.title}</div>
      <div class="pmeta">${p.client || '—'} · ${p.slot_count} slot</div>
    `;
    el.onclick = () => loadProject(p.id);
    list.appendChild(el);
  });
}

async function createProject() {
  const title = document.getElementById('newTitle').value.trim();
  const client = document.getElementById('newClient').value.trim();
  if (!title) { toast('Proje adı gerekli', true); return; }
  try {
    const p = await api('POST', '/api/projects', Object.assign(new FormData(), {
      append: (k,v) => new FormData().append(k,v)
    }));
    // FormData ile gönder
    const fd = new FormData();
    fd.append('title', title);
    fd.append('client', client);
    const res = await fetch('/api/projects', { method: 'POST', body: fd });
    const data = await res.json();
    document.getElementById('newTitle').value = '';
    document.getElementById('newClient').value = '';
    await loadProjects();
    loadProject(data.id);
    toast('Proje oluşturuldu');
  } catch(e) { toast(e.message, true); }
}

async function loadProject(id) {
  currentProjectId = id;
  const p = await api('GET', `/api/projects/${id}`);

  document.querySelectorAll('.project-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.project-item').forEach(el => {
    if (el.querySelector('.ptitle')?.textContent === p.title) el.classList.add('active');
  });

  const main = document.getElementById('mainPanel');
  main.innerHTML = `
    <div class="action-bar">
      <div class="project-info">
        <h1>${p.title}</h1>
        <div class="sub">${p.client || 'Müşteri belirtilmemiş'} · ${p.slots.length} ürün slot</div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="downloadZip(${p.id})">
        <div class="spinner" id="zipSpinner"></div>
        <span id="zipBtnText">⬇ ZIP İndir</span>
      </button>
    </div>

    <div class="slot-section">
      <h2>Ürün Zaman Aralıkları</h2>
      ${p.slots.length === 0
        ? '<div style="color:#444;font-size:13px;padding:16px 0;">Henüz slot eklenmedi.</div>'
        : `<table>
            <thead>
              <tr>
                <th>Başlangıç</th>
                <th>Bitiş</th>
                <th>Ürün</th>
                <th>URL</th>
                <th>Kod</th>
              </tr>
            </thead>
            <tbody>
              ${p.slots.map(s => `
                <tr>
                  <td><span class="ts">${s.ts_start}</span></td>
                  <td><span class="ts">${s.ts_end}</span></td>
                  <td>${s.product_name || '—'}</td>
                  <td><span class="url-cell" title="${s.product_url}">${s.product_url}</span></td>
                  <td><span class="code">${s.short_code}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>`
      }
    </div>

    <div class="add-slot-card">
      <h2>Yeni Slot Ekle</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Başlangıç (ss:dd:sn)</label>
          <input type="text" id="tsStart" placeholder="01:22:30" />
        </div>
        <div class="form-group">
          <label>Bitiş (ss:dd:sn)</label>
          <input type="text" id="tsEnd" placeholder="01:22:59" />
        </div>
        <div class="form-group">
          <label>Ürün Adı</label>
          <input type="text" id="productName" placeholder="Vakko Siyah Elbise" />
        </div>
        <div class="form-group">
          <label>Ürün URL'i</label>
          <input type="url" id="productUrl" placeholder="https://www.vakko.com/..." />
        </div>
      </div>
      <p class="hint">Watermark bu URL'i direkt encode eder. Değiştirmek isterseniz yeni proje oluşturun.</p>
      <button class="btn btn-sm" style="margin-top:16px;" onclick="addSlot(${p.id})">Slot Ekle</button>
    </div>
  `;
}

async function addSlot(projectId) {
  const ts_start = document.getElementById('tsStart').value.trim();
  const ts_end = document.getElementById('tsEnd').value.trim();
  const product_url = document.getElementById('productUrl').value.trim();
  const product_name = document.getElementById('productName').value.trim();

  if (!ts_start || !ts_end || !product_url) {
    toast('Başlangıç, bitiş ve URL zorunlu', true); return;
  }

  const fd = new FormData();
  fd.append('ts_start', ts_start);
  fd.append('ts_end', ts_end);
  fd.append('product_url', product_url);
  fd.append('product_name', product_name);

  try {
    await fetch(`/api/projects/${projectId}/slots`, { method: 'POST', body: fd });
    toast('Slot eklendi');
    loadProject(projectId);
    loadProjects();
  } catch(e) { toast(e.message, true); }
}

async function downloadZip(projectId) {
  const spinner = document.getElementById('zipSpinner');
  const btnText = document.getElementById('zipBtnText');
  spinner.style.display = 'block';
  btnText.textContent = 'Hazırlanıyor...';

  try {
    const r = await fetch(`/api/projects/${projectId}/zip`);
    if (!r.ok) throw new Error('ZIP oluşturulamadı');
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `brandion_proje_${projectId}.zip`;
    a.click();
    toast('ZIP indirildi');
  } catch(e) {
    toast(e.message, true);
  } finally {
    spinner.style.display = 'none';
    btnText.textContent = '⬇ ZIP İndir';
  }
}

loadProjects();
</script>
</body>
</html>
